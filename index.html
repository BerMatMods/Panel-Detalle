<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/><title>✨ Galaxia del Amor - Panel ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Uncial+Antiqua&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#00ffff;--neon-dark:#00bfff;--bg-start:#e0f7ff;--bg-mid:#ffffff;--bg-end:#f0faff;--card-bg:rgba(255,255,255,0.85);--text:#0a3a4a;--shadow:0 8px 32px rgba(0,200,255,0.15)}
body{font-family:'Poppins',sans-serif;background:linear-gradient(180deg,var(--bg-start) 0%,var(--bg-mid) 50%,var(--bg-end) 100%);color:var(--text);min-height:100vh;padding:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
.container{max-width:720px;margin:0 auto}
header{text-align:center;padding:24px 16px}
header h1{font-family:'Creepster',cursive;font-size:44px;color:var(--neon);text-shadow:0 0 15px var(--neon),0 0 30px var(--neon-dark),0 0 45px rgba(0,191,255,0.6);letter-spacing:2px;margin-bottom:4px}
header p{color:#5a7a8a;font-size:15px}
.card{background:var(--card-bg);border-radius:24px;padding:22px;margin:16px 0;border:2px solid rgba(0,200,255,0.25);box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.card h3{font-family:'Uncial Antiqua',serif;font-size:22px;color:var(--neon-dark);margin-bottom:16px;padding-bottom:12px;border-bottom:2px dashed rgba(0,200,255,0.3)}
label{display:block;margin:14px 0 8px;color:#0a5a6a;font-weight:500;font-size:14px}
input[type="text"],input[type="url"],input[type="color"],textarea{width:100%;padding:14px 16px;border-radius:14px;border:2px solid rgba(0,200,255,0.3);background:rgba(255,255,255,0.9);color:var(--text);font-size:15px;outline:none;transition:all 0.3s ease}
input:focus,textarea:focus{border-color:var(--neon);box-shadow:0 0 0 4px rgba(0,255,255,0.15)}
.preview{text-align:center;padding:18px;background:linear-gradient(135deg,rgba(0,255,255,0.08),rgba(0,191,255,0.08));border-radius:16px;margin-top:14px;font-family:'Uncial Antiqua',serif;font-size:28px;color:var(--neon-dark);text-shadow:0 0 12px var(--neon);letter-spacing:1px}
.phrases-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.phrase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;max-height:180px;overflow-y:auto;padding:4px}
.phrase-tag{background:linear-gradient(135deg,rgba(0,255,255,0.15),rgba(0,191,255,0.15));border:1px solid rgba(0,200,255,0.4);border-radius:12px;padding:10px 12px;font-size:13px;text-align:center;position:relative;cursor:pointer;transition:0.2s}
.phrase-tag:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,200,255,0.2)}
.phrase-tag .remove{position:absolute;top:-6px;right:-6px;background:var(--neon);color:#000;border-radius:50%;width:20px;height:20px;font-size:12px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-weight:bold;line-height:1}
.btn{background:linear-gradient(135deg,var(--neon),var(--neon-dark));color:#000;border:none;padding:16px 28px;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease;width:100%;margin-top:12px;box-shadow:0 6px 20px rgba(0,200,255,0.35);font-family:'Poppins',sans-serif}
.btn:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(0,200,255,0.55)}
.btn:active{transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid var(--neon);color:var(--neon-dark);padding:10px 22px;border-radius:30px;font-size:14px;cursor:pointer;transition:0.3s;font-weight:500}
.btn-outline:hover{background:rgba(0,255,255,0.12)}
.btn-modal{background:var(--neon);color:#000;border:none;padding:12px 28px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;transition:0.3s;margin-top:8px}
.btn-modal:hover{box-shadow:0 0 25px rgba(0,255,255,0.5)}
.result{background:linear-gradient(135deg,rgba(0,255,255,0.12),rgba(0,191,255,0.12));border:2px solid var(--neon);border-radius:20px;padding:22px;margin-top:20px;text-align:center;display:none}
.result.show{display:block;animation:slideIn 0.4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.result a{color:var(--neon-dark);font-weight:600;word-break:break-all;text-decoration:none;display:block;margin:12px 0;font-size:14px}
.result a:hover{text-shadow:0 0 10px var(--neon)}
.copy-btn{background:var(--neon);color:#000;border:none;padding:10px 24px;border-radius:28px;margin-top:12px;cursor:pointer;font-weight:600;transition:0.3s;font-size:14px}
.copy-btn:hover{background:#7df9ff;transform:scale(1.02)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,58,74,0.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal.active{opacity:1;pointer-events:all}
.modal-content{background:linear-gradient(145deg,#ffffff,#f0faff);border-radius:28px;padding:28px;width:100%;max-width:420px;border:3px solid var(--neon);box-shadow:0 0 40px rgba(0,255,255,0.4);animation:modalPop 0.35s ease}
@keyframes modalPop{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal h4{font-family:'Creepster',cursive;font-size:28px;color:var(--neon);text-align:center;margin-bottom:18px;text-shadow:0 0 12px var(--neon)}
.modal input{margin:12px 0;padding:14px;border-radius:12px;border:2px solid rgba(0,200,255,0.4);font-size:15px;width:100%}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border-radius:25px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:0.3s}
.modal-save{background:var(--neon);color:#000}
.modal-cancel{background:#e0e0e0;color:#333}
.modal-save:hover{box-shadow:0 0 20px rgba(0,255,255,0.5)}
.modal-cancel:hover{background:#d0d0d0}
.info{font-size:12px;color:#6a8a9a;margin-top:6px;text-align:center}
.phrase-count{font-size:12px;color:#8aa;text-align:right;margin-top:4px}
@media(max-width:480px){header h1{font-size:36px}.card{padding:18px;border-radius:20px}.phrase-grid{grid-template-columns:repeat(2,1fr)}.modal-content{padding:22px;border-radius:24px}}
</style>
</head>
<body>
<div class="container">
<header><h1>𝐆𝐚𝐥𝐚𝐱𝐢𝐚</h1><p>Personaliza tu dedicatoria mágica</p></header>

<div class="card">
<h3>📝 Nombre Central</h3>
<label for="centralName">Nombre que brillará en el corazón</label>
<input type="text" id="centralName" value="BerMat-Code" maxlength="20" placeholder="Ej: BerMat-Code, Amor, Mi Rey...">
<div class="preview" id="namePreview">BerMat-Code</div>
</div>

<div class="card">
<div class="phrases-header">
<h3>💬 Frases Mágicas</h3>
<button type="button" class="btn-outline" id="openModal">+ Agregar Frase</button>
</div>
<p class="info">Frases que flotarán en tu galaxia (máx. 20)</p>
<div class="phrase-grid" id="phraseList"></div>
<div class="phrase-count" id="phraseCount">0/20</div>
</div>

<div class="card">
<h3>🎨 Estilo Celestial</h3>
<label for="neonColor">Color Neón Principal</label>
<input type="color" id="neonColor" value="#00ffff">
<label for="musicUrl" style="margin-top:16px">🎵 Música (MP3 directo)</label>
<input type="url" id="musicUrl" value="https://github.com/BerMatMods/Hello-kitty/raw/refs/heads/main/TikVid.io_7289423782995889414%20(1).mp3" placeholder="https://...">
<p class="info">Enlace directo a archivo .mp3</p>
</div>

<button type="button" class="btn" id="generateBtn">🔗 Crear Mi Link Mágico</button>

<div class="result" id="resultBox">
<p style="margin-bottom:8px;font-weight:600">✅ ¡Tu galaxia está encantada!</p>
<a href="#" target="_blank" id="generatedLink"></a>
<button type="button" class="copy-btn" id="copyBtn">📋 Copiar Link</button>
</div>
</div>

<div class="modal" id="phraseModal">
<div class="modal-content">
<h4>✨ Nueva Frase ✨</h4>
<input type="text" id="newPhrase" maxlength="50" placeholder="Ej: 💙 Eres mi universo 💙">
<p class="info">Puedes usar emojis y hasta 50 caracteres</p>
<div class="modal-actions">
<button type="button" class="modal-cancel" id="cancelModal">Cancelar</button>
<button type="button" class="modal-save" id="saveModal">Guardar ✨</button>
</div>
</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";import{getAnalytics}from"https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics.js";import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";import{getAuth,signInAnonymously}from"https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
const firebaseConfig={apiKey:"AIzaSyBMeWl3gz-iALWcMPwHW6TMgEEIUSYKBTw",authDomain:"personalizacion-38cb1.firebaseapp.com",projectId:"personalizacion-38cb1",storageBucket:"personalizacion-38cb1.firebasestorage.app",messagingSenderId:"434378253117",appId:"1:434378253117:web:2c7a01062787756201db54",measurementId:"G-HTVYPVSG4X"};
const app=initializeApp(firebaseConfig);const analytics=getAnalytics(app);const auth=getAuth(app);const db=getFirestore(app);
const defaultPhrases=["💙 Te amo 💙","🌹 Mi amor 🌹","👑 Mi rey 👑","❤️ Mi vida ❤️","✨ Corazón ✨","💫 Eres todo 💫","🌸 Siempre tú 🌸","💞 Amor eterno 💞","🌷 Mi sol 🌷","💌 Para siempre 💌","🌙 Mi estrella 🌙","🤍 Contigo 🤍","🔥 Mi todo 🔥","🕊️ Paz y amor 🕊️"];
const phraseList=document.getElementById("phraseList");const centralNameInput=document.getElementById("centralName");const namePreview=document.getElementById("namePreview");const neonColorInput=document.getElementById("neonColor");const musicUrlInput=document.getElementById("musicUrl");const openModalBtn=document.getElementById("openModal");const generateBtn=document.getElementById("generateBtn");const resultBox=document.getElementById("resultBox");const generatedLink=document.getElementById("generatedLink");const copyBtn=document.getElementById("copyBtn");const phraseModal=document.getElementById("phraseModal");const newPhraseInput=document.getElementById("newPhrase");const saveModalBtn=document.getElementById("saveModal");const cancelModalBtn=document.getElementById("cancelModal");const phraseCountEl=document.getElementById("phraseCount");
let phrases=[...defaultPhrases];
function updateCount(){phraseCountEl.textContent=`${phrases.length}/20`}
function renderPhrases(){phraseList.innerHTML="";phrases.forEach((phrase,index)=>{const tag=document.createElement("div");tag.className="phrase-tag";tag.innerHTML=`${phrase}<button type="button" class="remove" data-index="${index}">×</button>`;tag.querySelector("input")?.addEventListener("input",e=>{phrases[index]=e.target.value;renderPhrases()});tag.querySelector(".remove")?.addEventListener("click",e=>{e.stopPropagation();phrases.splice(index,1);renderPhrases();updateCount()});phraseList.appendChild(tag)});updateCount()}
renderPhrases();
openModalBtn.addEventListener("click",()=>{if(phrases.length>=20){alert("✨ Máximo 20 frases permitidas ✨");return}newPhraseInput.value="";phraseModal.classList.add("active");newPhraseInput.focus()});
cancelModalBtn.addEventListener("click",()=>phraseModal.classList.remove("active"));
saveModalBtn.addEventListener("click",()=>{const val=newPhraseInput.value.trim();if(val){phrases.push(val);renderPhrases();phraseModal.classList.remove("active")}});
phraseModal.addEventListener("click",e=>{if(e.target===phraseModal)phraseModal.classList.remove("active")});
document.addEventListener("keydown",e=>{if(e.key==="Escape")phraseModal.classList.remove("active")});
centralNameInput.addEventListener("input",e=>{namePreview.textContent=e.target.value||"Nombre";namePreview.style.color=neonColorInput.value;namePreview.style.textShadow=`0 0 12px ${neonColorInput.value}`});
neonColorInput.addEventListener("input",e=>{namePreview.style.color=e.target.value;namePreview.style.textShadow=`0 0 12px ${e.target.value}`;document.documentElement.style.setProperty("--neon",e.target.value);document.documentElement.style.setProperty("--neon-dark",e.target.value.replace("ffff","bfff"))});
generateBtn.addEventListener("click",async()=>{generateBtn.disabled=true;generateBtn.textContent="⏳ Creando magia...";try{await signInAnonymously(auth);const configId=Date.now().toString(36)+Math.random().toString(36).substr(2,5);const config={centralName:centralNameInput.value.trim()||"BerMat-Code",phrases:phrases.filter(p=>p.trim()),neonColor:neonColorInput.value,musicUrl:musicUrlInput.value,createdAt:new Date().toISOString(),version:2};await setDoc(doc(db,"configs",configId),config);const baseUrl=window.location.href.replace(/panel\.html.*/,"")+"show.html";const fullLink=`${baseUrl}?id=${configId}`;generatedLink.href=fullLink;generatedLink.textContent=fullLink;resultBox.classList.add("show");generateBtn.textContent="✅ ¡Crear Otro Link!";resultBox.scrollIntoView({behavior:"smooth",block:"center"})}catch(error){console.error("Error:",error);alert("✨ Error: "+error.message);generateBtn.disabled=false;generateBtn.textContent="🔗 Crear Mi Link Mágico"}});
copyBtn.addEventListener("click",()=>{navigator.clipboard.writeText(generatedLink.href).then(()=>{const orig=copyBtn.textContent;copyBtn.textContent="✅ ¡Copiado!";setTimeout(()=>copyBtn.textContent=orig,2000)})});
namePreview.style.color=neonColorInput.value;namePreview.style.textShadow=`0 0 12px ${neonColorInput.value}`;
</script>
</body>
</html>

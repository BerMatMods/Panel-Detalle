<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>BerMatMods - Creador de Galaxias</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; overflow: hidden; background: #000011; font-family: 'Inter', sans-serif; height: 100%; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

    /* === PANEL DE PERSONALIZACIÓN (CLARO / GLASSMORPHISM) === */
    #mainPanel {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* Fondo semitransparente claro, no negro sólido */
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 100; display: flex; flex-direction: column;
      transition: opacity 0.5s ease, transform 0.5s ease;
      overflow: hidden;
    }
    #mainPanel.hidden { opacity: 0; transform: translateY(-30px); pointer-events: none; }

    /* Header */
    .panel-header {
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.4);
      text-align: center;
    }
    .panel-title {
      color: #d63384; font-size: 20px; font-weight: 700;
      font-family: 'Dancing Script', cursive;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* Contenido */
    .panel-content {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 15px;
    }

    /* Secciones */
    .section {
      background: rgba(255, 255, 255, 0.6); 
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 16px; padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .section-title {
      color: #555; font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }

    /* Input Nombre */
    .name-input {
      width: 100%; background: rgba(255,255,255,0.8);
      border: 2px solid #d63384; border-radius: 12px;
      padding: 12px; color: #d63384; font-size: 20px; font-weight: 700;
      font-family: 'Dancing Script', cursive; text-align: center;
      outline: none;
    }

    /* Frases */
    .phrases-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
      max-height: 200px; overflow-y: auto; padding: 4px;
    }
    .phrase-card {
      background: white; border: 1px solid #eee; border-radius: 10px;
      padding: 8px 10px; font-size: 12px; cursor: pointer;
      transition: all 0.2s; text-align: center; position: relative;
    }
    .phrase-card:hover { border-color: #d63384; }
    .phrase-card.active {
      background: linear-gradient(135deg, #ff6b9d, #d63384); color: white; border: none;
    }
    .phrase-card .check { display: none; }
    .phrase-card.active .check { display: inline; }

    .add-custom-btn {
      width: 100%; margin-top: 10px; padding: 10px; border-radius: 10px;
      border: 2px dashed #d63384; background: transparent;
      color: #d63384; font-weight: 600; cursor: pointer;
    }

    /* Colores */
    .color-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .color-btn {
      height: 45px; border-radius: 12px; border: 3px solid transparent;
      cursor: pointer; transition: transform 0.2s; position: relative;
    }
    .color-btn:hover { transform: scale(1.05); }
    .color-btn.active { border-color: white; box-shadow: 0 0 0 2px #d63384; }
    .color-btn::after { content: '✓'; position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); color: white; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5); display: none; }
    .color-btn.active::after { display: block; }

    /* Botones de acción */
    .actions {
      padding: 15px 20px 25px;
      background: rgba(255,255,255,0.6);
      border-top: 1px solid rgba(255,255,255,0.3);
      display: flex; flex-direction: column; gap: 10px;
    }
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d, #d63384);
      color: white; box-shadow: 0 4px 15px rgba(214, 51, 132, 0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); }
    
    .btn-secondary {
      background: white; color: #d63384;
      border: 2px solid #d63384;
    }

    /* Resultado Link */
    .link-box {
      background: white; border-radius: 12px; padding: 12px;
      display: none; animation: slideUp 0.3s ease;
      border: 1px solid #eee;
    }
    .link-box.show { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .link-url {
      background: #f0f0f0; padding: 8px; border-radius: 8px;
      font-family: monospace; font-size: 11px; color: #555;
      word-break: break-all; margin: 8px 0;
    }
    .copy-row { display: flex; gap: 10px; }
    .copy-btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      background: #d63384; color: white; font-weight: 600; cursor: pointer;
    }

    /* Loading */
    .loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);
      z-index: 200; display: none; justify-content: center; align-items: center;
      flex-direction: column; gap: 15px;
    }
    .loading.show { display: flex; }
    .loader {
      width: 40px; height: 40px; border: 4px solid #eee;
      border-top-color: #d63384; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="canvas3d"></canvas>

  <!-- PANEL CLARO -->
  <div id="mainPanel">
    <div class="panel-header">
      <div class="panel-title">✨ Crea tu Galaxia</div>
    </div>
    
    <div class="panel-content">
      <div class="section">
        <div class="section-title">💌 Nombre Central</div>
        <input type="text" class="name-input" id="inputName" placeholder="Escribe un nombre..." maxlength="20" value="Nicole">
      </div>

      <div class="section">
        <div class="section-title">💬 Frases Románticas</div>
        <div class="phrases-grid" id="phrasesGrid"></div>
        <button class="add-custom-btn" id="addCustomBtn">+ Agregar frase</button>
      </div>

      <div class="section">
        <div class="section-title">🎨 Color de la Galaxia</div>
        <div class="color-grid" id="colorGrid">
          <div class="color-btn" style="background: linear-gradient(135deg, #ff6b9d, #ff9ec8)" data-theme="pink" title="Rosa"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #6bb6ff, #88ccff)" data-theme="blue" title="Azul"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #ffcc88, #ffddaa)" data-theme="gold" title="Dorado"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #cc88ff, #dd99ff)" data-theme="purple" title="Morado"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #88ffcc, #99ffdd)" data-theme="mint" title="Menta"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #ff88cc, #ff99dd)" data-theme="rose" title="Rosa Fuerte"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #ff9966, #ffcc99)" data-theme="sunset" title="Atardecer"></div>
          <div class="color-btn" style="background: linear-gradient(135deg, #66ccff, #88ddff)" data-theme="ocean" title="Océano"></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="generateBtn">🔗 Generar Enlace Mágico</button>
      <button class="btn btn-secondary" id="startBtn">▶️ Ver Animación</button>
      
      <div class="link-box" id="linkBox">
        <div style="font-size:12px; color:#888; font-weight:600;">¡Listo! Copia tu enlace:</div>
        <div class="link-url" id="linkUrl"></div>
        <div class="copy-row">
          <button class="copy-btn" id="copyBtn">📋 Copiar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loader"></div>
    <div style="color:#d63384; font-weight:600;" id="loadingText">Cargando...</div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="https://github.com/BerMatMods/Music/raw/refs/heads/main/TikVid.io_7587642402924481803.mp3.m4a" type="audio/mp4">
  </audio>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.min.js"></script>

  <script>
    // === CONFIGURACIÓN FIREBASE ===
    const firebaseConfig = {
      apiKey: "AIzaSyBMeWl3gz-iALWcMPwHW6TMgEEIUSYKBTw",
      authDomain: "personalizacion-38cb1.firebaseapp.com",
      projectId: "personalizacion-38cb1",
      storageBucket: "personalizacion-38cb1.firebasestorage.app",
      messagingSenderId: "434378253117",
      appId: "1:434378253117:web:2c7a01062787756201db54",
      measurementId: "G-HTVYPVSG4X"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // === DATOS Y ESTADO ===
    const DEFAULT_PHRASES = ["💖 Te amo 💖","🌹 Mi amor 🌹","👑 Mi reina 👑","❤️ Mi vida ❤️","✨ Corazón ✨","💫 Eres todo 💫","🌸 Siempre tú 🌸"];
    const THEMES = {
      pink: { rings: [0xffc0cb,0xffcc88,0x88ccff,0xcc88ff,0xff88cc], galaxy: ['#ff9ec8','#ffcc88'] },
      blue: { rings: [0x88ccff,0x4488ff,0x88ddff,0x66aaff,0x99ccff], galaxy: ['#88ccff','#4488ff'] },
      gold: { rings: [0xffcc88,0xff9944,0xffdd99,0xffbb66,0xffcc77], galaxy: ['#ffcc88','#ff9944'] },
      purple: { rings: [0xcc88ff,0x9944cc,0xdd99ff,0xbb66ee,0xcc99ff], galaxy: ['#cc88ff','#9944cc'] },
      mint: { rings: [0x88ffcc,0x44cc99,0x99ffdd,0x66eebb,0x88ffdd], galaxy: ['#88ffcc','#44cc99'] },
      rose: { rings: [0xff88cc,0xff4499,0xff99dd,0xff66bb,0xff88dd], galaxy: ['#ff88cc','#ff4499'] },
      sunset: { rings: [0xff9966,0xffcc99,0xff6699,0xffaa77,0xffbb88], galaxy: ['#ff9966','#ffcc99'] },
      ocean: { rings: [0x66ccff,0x88ddff,0x44aacc,0x77bbff,0x99ccff], galaxy: ['#66ccff','#88ddff'] }
    };

    let customData = { name: 'Nicole', phrases: [...DEFAULT_PHRASES], theme: 'pink' };
    let scene, camera, renderer, controls;
    let rings = [], romanticSprites = [], hearts = [];
    let time = 0, started = false, zoomDone = false;
    let textures = {};

    // === FUNCIONES CORE ===
    function getParticleTexture(hex) {
      if (textures[hex]) return textures[hex];
      const c = document.createElement('canvas'); c.width = c.height = 64;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(32,32,0, 32,32,32);
      g.addColorStop(0, hex); g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(32,32,30,0,Math.PI*2); ctx.fill();
      const t = new THREE.CanvasTexture(c); t.transparent = true;
      textures[hex] = t; return t;
    }

    function initScene(data) {
      // Limpiar si existe
      if (scene) while(scene.children.length > 0) scene.remove(scene.children[0]);
      rings = []; romanticSprites = []; hearts = []; textures = {};

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000011);
      camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
      camera.position.set(0, 2, 22);
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.minDistance = 30; controls.maxDistance = 300;
      controls.enabled = false;

      // Construir escena basada en datos
      buildGalaxy(data.theme);
      buildText(data.name);
      buildRings(data.theme);
      buildPhrases(data.phrases);
      buildHearts();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function buildText(name) {
      new THREE.FontLoader().load('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
        const geo = new THREE.TextGeometry(name, { font, size: 5, height: 2.5, curveSegments: 12, bevelEnabled: true });
        geo.computeBoundingBox();
        const cx = -0.5 * (geo.boundingBox.max.x - geo.boundingBox.min.x);
        geo.translate(cx, 0, 0);
        scene.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xffffff })));
      });
    }

    function buildGalaxy(themeName) {
      const theme = THEMES[themeName];
      const g = new THREE.BufferGeometry();
      const pos = new Float32Array(4000 * 3);
      const col = new Float32Array(4000 * 3);
      const colors = theme.galaxy.map(c => new THREE.Color(c));
      for (let i=0; i<4000; i++) {
        const r = Math.pow(Math.random(), 0.65) * 150 + 20;
        const a = Math.random() * Math.PI * 2;
        pos[i*3] = Math.cos(a)*r; pos[i*3+1] = (Math.random()-0.5)*20; pos[i*3+2] = Math.sin(a)*r;
        const c = colors[Math.floor(Math.random()*colors.length)];
        col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
      }
      g.setAttribute('position', new THREE.BufferAttribute(pos,3));
      g.setAttribute('color', new THREE.BufferAttribute(col,3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false })));
    }

    function buildRings(themeName) {
      const theme = THEMES[themeName];
      for (let i=0; i<8; i++) {
        const g = new THREE.BufferGeometry();
        const pos = new Float32Array(300 * 3);
        const rBase = 20 + i * 15;
        for (let j=0; j<300; j++) {
          const a = (j/300)*Math.PI*2;
          pos[j*3] = Math.cos(a)*rBase; pos[j*3+1] = Math.sin(a)*rBase*0.1; pos[j*3+2] = Math.sin(a)*rBase;
        }
        g.setAttribute('position', new THREE.BufferAttribute(pos,3));
        const color = theme.rings[i % theme.rings.length];
        const ring = new THREE.Points(g, new THREE.PointsMaterial({ size: 3-i*0.2, color: color, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
        ring.userData = { speed: (i%2?1:-1)*0.01, baseR: rBase };
        rings.push(ring); scene.add(ring);
      }
    }

    function buildPhrases(phrases) {
      for (let i=0; i<40; i++) {
        const p = phrases[i % phrases.length];
        const c = document.createElement('canvas'); c.width=256; c.height=128;
        const ctx = c.getContext('2d');
        ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff9ec8';
        ctx.fillText(p, 128, 64);
        const tex = new THREE.CanvasTexture(c);
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
        const r = 40 + Math.random()*60, a = Math.random()*Math.PI*2;
        sp.position.set(Math.cos(a)*r, Math.sin(a)*r*0.3, Math.sin(a)*r);
        sp.scale.set(15, 6, 1);
        sp.userData = { baseAngle: a, radius: r, speed: 0.001 + Math.random()*0.001 };
        romanticSprites.push(sp); scene.add(sp);
      }
    }

    function buildHearts() {
      for (let i=0; i<10; i++) {
        const g = new THREE.BufferGeometry();
        const pos = new Float32Array(100 * 3);
        for (let j=0; j<100; j++) {
          const t = (j/100)*Math.PI*2;
          const x = 16*Math.pow(Math.sin(t),3);
          const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
          pos[j*3] = x*0.3; pos[j*3+1] = y*0.3; pos[j*3+2] = 0;
        }
        g.setAttribute('position', new THREE.BufferAttribute(pos,3));
        const h = new THREE.Points(g, new THREE.PointsMaterial({ size: 2, color: 0xff5588, transparent: true, blending: THREE.AdditiveBlending }));
        h.userData = { speedY: 0.1 + Math.random()*0.2, offX: (Math.random()-0.5)*80, offZ: (Math.random()-0.5)*80, startY: -60 - Math.random()*40 };
        hearts.push(h); scene.add(h);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      if (!started) return;
      time += 0.016;
      
      if (!zoomDone && time < 5) {
        const t = time/5;
        camera.position.z = THREE.MathUtils.lerp(22, 150, t);
        camera.lookAt(0,0,0);
      } else if (!zoomDone) { zoomDone = true; controls.enabled = true; }

      rings.forEach((r, i) => { r.rotation.y += r.userData.speed; r.rotation.x = Math.sin(time*0.5 + i)*0.1; });
      romanticSprites.forEach(sp => {
        const a = sp.userData.baseAngle + time * sp.userData.speed;
        sp.position.set(Math.cos(a)*sp.userData.radius, Math.sin(a)*sp.userData.radius*0.3 + Math.sin(time)*2, Math.sin(a)*sp.userData.radius);
      });
      hearts.forEach(h => {
        h.position.y = h.userData.startY + time * h.userData.speedY * 10;
        h.position.x = h.userData.offX + Math.sin(time*2)*3;
        if (h.position.y > 80) h.userData.startY = -70 - Math.random()*20;
      });
      
      controls.update();
      renderer.render(scene, camera);
    }

    // === UI LOGIC ===
    function setupUI() {
      const panel = document.getElementById('mainPanel');
      const inputName = document.getElementById('inputName');
      const phrasesGrid = document.getElementById('phrasesGrid');
      const colorGrid = document.getElementById('colorGrid');
      const generateBtn = document.getElementById('generateBtn');
      const startBtn = document.getElementById('startBtn');
      const linkBox = document.getElementById('linkBox');
      const linkUrl = document.getElementById('linkUrl');
      const copyBtn = document.getElementById('copyBtn');
      const loading = document.getElementById('loading');

      // Renderizar Chips de Frases
      function renderPhrases() {
        phrasesGrid.innerHTML = '';
        const activePhrases = customData.phrases;
        DEFAULT_PHRASES.forEach(phrase => {
          const chip = document.createElement('div');
          chip.className = `phrase-card ${activePhrases.includes(phrase) ? 'active' : ''}`;
          chip.innerHTML = `${phrase} <span class="check">✓</span>`;
          chip.onclick = () => {
            if (activePhrases.includes(phrase)) {
              customData.phrases = activePhrases.filter(p => p !== phrase);
            } else {
              customData.phrases.push(phrase);
            }
            renderPhrases();
          };
          phrasesGrid.appendChild(chip);
        });
      }

      // Selección de Color
      colorGrid.addEventListener('click', (e) => {
        const btn = e.target.closest('.color-btn');
        if (btn) {
          colorGrid.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          customData.theme = btn.dataset.theme;
        }
      });

      // Agregar Frase Personalizada
      document.getElementById('addCustomBtn').onclick = () => {
        const p = prompt("Escribe tu frase:");
        if (p && p.length < 30) {
          customData.phrases.push(p);
          // Crear chip para la frase personalizada
          const chip = document.createElement('div');
          chip.className = 'phrase-card active';
          chip.innerHTML = `${p} <span class="check">✓</span>`;
          phrasesGrid.appendChild(chip);
        }
      };

      // Generar Link
      generateBtn.onclick = async () => {
        customData.name = inputName.value || 'Nombre';
        loading.classList.add('show');
        try {
          const docRef = await db.collection('customizations').add({
            ...customData,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          const url = `${window.location.origin}${window.location.pathname}?id=${docRef.id}`;
          linkUrl.textContent = url;
          linkBox.classList.add('show');
          loading.classList.remove('show');
        } catch (e) {
          alert("Error al guardar: " + e.message);
          loading.classList.remove('show');
        }
      };

      // Copiar
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(linkUrl.textContent);
        copyBtn.textContent = '¡Copiado!';
        setTimeout(() => copyBtn.textContent = '📋 Copiar', 2000);
      };

      // Iniciar
      startBtn.onclick = () => {
        customData.name = inputName.value || 'Nombre';
        const music = document.getElementById('bgMusic');
        music.play().catch(()=>{});
        panel.classList.add('hidden');
        started = true;
        time = 0; zoomDone = false;
      };

      // Inicializar
      renderPhrases();
      
      // Verificar si es un enlace guardado
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      if (id) {
        loading.classList.add('show');
        db.collection('customizations').doc(id).get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            customData = data;
            inputName.value = data.name;
            renderPhrases();
            // Marcar color
            document.querySelectorAll('.color-btn').forEach(b => {
              b.classList.toggle('active', b.dataset.theme === data.theme);
            });
            initScene(data);
            setTimeout(() => {
              loading.classList.remove('show');
              // Auto-start si viene de link
              started = true; time = 0; zoomDone = false;
              document.getElementById('bgMusic').play().catch(()=>{});
              panel.classList.add('hidden');
            }, 500);
          } else {
            alert("Enlace no válido");
            loading.classList.remove('show');
            initScene(customData);
          }
        });
      } else {
        initScene(customData);
      }
      animate();
    }

    window.onload = setupUI;
  </script>
</body>
</html>
